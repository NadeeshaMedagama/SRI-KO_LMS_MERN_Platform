# Dependency Updates - Auto-merge and notify on Dependabot PRs
# Automatically merges minor/patch updates after CI passes

name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ───────────────────────────────────────────
  # Auto-merge minor and patch updates
  # ───────────────────────────────────────────
  dependabot-auto-merge:
    name: Auto-Merge Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge minor and patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure labels exist
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          # Create labels — use the API directly so it works regardless of gh CLI version
          gh api repos/${{ github.repository }}/labels \
            -f name="major-update" \
            -f color="D93F0B" \
            -f description="Major version dependency update" \
            --silent 2>/dev/null \
          || gh api repos/${{ github.repository }}/labels/major-update \
            -X PATCH \
            -f color="D93F0B" \
            -f description="Major version dependency update" \
            --silent 2>/dev/null \
          || true

          gh api repos/${{ github.repository }}/labels \
            -f name="needs-review" \
            -f color="FBCA04" \
            -f description="Requires manual review" \
            --silent 2>/dev/null \
          || gh api repos/${{ github.repository }}/labels/needs-review \
            -X PATCH \
            -f color="FBCA04" \
            -f description="Requires manual review" \
            --silent 2>/dev/null \
          || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add labels for major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: gh pr edit "$PR_URL" --add-label "major-update" --add-label "needs-review"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ───────────────────────────────────────────
  # Dependency audit on PRs (no GHAS required)
  # ───────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Normalize Frontend lint deps (eslint/react plugin compatibility)
        working-directory: Frontend
        run: npm pkg set devDependencies.eslint="^9.39.0"

      - name: Install Frontend dependencies
        working-directory: Frontend
        run: npm install --no-fund --no-audit

      - name: Audit Backend dependencies
        id: backend-audit
        working-directory: Backend
        run: |
          echo "## Backend Dependency Audit" > $GITHUB_WORKSPACE/audit-report.md
          echo "" >> $GITHUB_WORKSPACE/audit-report.md
          if npm audit --audit-level=high 2>&1 | tee backend-audit.txt; then
            echo "✅ No high or critical vulnerabilities found" >> $GITHUB_WORKSPACE/audit-report.md
          else
            echo "⚠️ Vulnerabilities detected:" >> $GITHUB_WORKSPACE/audit-report.md
            echo '```' >> $GITHUB_WORKSPACE/audit-report.md
            tail -20 backend-audit.txt >> $GITHUB_WORKSPACE/audit-report.md
            echo '```' >> $GITHUB_WORKSPACE/audit-report.md
          fi
        continue-on-error: true

      - name: Audit Frontend dependencies
        id: frontend-audit
        working-directory: Frontend
        run: |
          echo "" >> $GITHUB_WORKSPACE/audit-report.md
          echo "## Frontend Dependency Audit" >> $GITHUB_WORKSPACE/audit-report.md
          echo "" >> $GITHUB_WORKSPACE/audit-report.md
          if npm audit --audit-level=high 2>&1 | tee frontend-audit.txt; then
            echo "✅ No high or critical vulnerabilities found" >> $GITHUB_WORKSPACE/audit-report.md
          else
            echo "⚠️ Vulnerabilities detected:" >> $GITHUB_WORKSPACE/audit-report.md
            echo '```' >> $GITHUB_WORKSPACE/audit-report.md
            tail -20 frontend-audit.txt >> $GITHUB_WORKSPACE/audit-report.md
            echo '```' >> $GITHUB_WORKSPACE/audit-report.md
          fi
        continue-on-error: true

      - name: Comment audit summary on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: dependency-audit
          path: audit-report.md

      - name: Fail on critical vulnerabilities
        run: |
          CRITICAL=0
          cd Backend
          BACKEND_CRITICAL=$(npm audit --json 2>/dev/null | node -e "
            let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
              try { const a=JSON.parse(d); console.log(a.metadata?.vulnerabilities?.critical||0); }
              catch(e) { console.log(0); }
            });" 2>/dev/null || echo "0")
          echo "Backend critical vulnerabilities: $BACKEND_CRITICAL"

          cd "$GITHUB_WORKSPACE/Frontend"
          FRONTEND_CRITICAL=$(npm audit --json 2>/dev/null | node -e "
            let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
              try { const a=JSON.parse(d); console.log(a.metadata?.vulnerabilities?.critical||0); }
              catch(e) { console.log(0); }
            });" 2>/dev/null || echo "0")
          echo "Frontend critical vulnerabilities: $FRONTEND_CRITICAL"

          TOTAL=$((BACKEND_CRITICAL + FRONTEND_CRITICAL))
          if [ "$TOTAL" -gt 0 ]; then
            echo "❌ Found $TOTAL critical vulnerabilities (Backend: $BACKEND_CRITICAL, Frontend: $FRONTEND_CRITICAL)"
            exit 1
          else
            echo "✅ No critical vulnerabilities found"
          fi

