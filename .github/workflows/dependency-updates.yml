# Dependency Updates - Auto-merge and notify on Dependabot PRs
# Automatically merges minor/patch updates after CI passes

name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ───────────────────────────────────────────
  # Auto-merge minor and patch updates
  # ───────────────────────────────────────────
  dependabot-auto-merge:
    name: Auto-Merge Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge minor and patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add label for major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: gh pr edit "$PR_URL" --add-label "major-update,needs-review"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ───────────────────────────────────────────
  # Dependency audit on PRs (no GHAS required)
  # ───────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Install Frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Audit Backend dependencies
        id: backend-audit
        working-directory: Backend
        run: |
          echo "## Backend Dependency Audit" > $GITHUB_WORKSPACE/audit-report.md
          echo "" >> $GITHUB_WORKSPACE/audit-report.md
          if npm audit --audit-level=high 2>&1 | tee backend-audit.txt; then
            echo "✅ No high or critical vulnerabilities found" >> $GITHUB_WORKSPACE/audit-report.md
          else
            echo "⚠️ Vulnerabilities detected:" >> $GITHUB_WORKSPACE/audit-report.md
            echo '```' >> $GITHUB_WORKSPACE/audit-report.md
            tail -20 backend-audit.txt >> $GITHUB_WORKSPACE/audit-report.md
            echo '```' >> $GITHUB_WORKSPACE/audit-report.md
          fi
        continue-on-error: true

      - name: Audit Frontend dependencies
        id: frontend-audit
        working-directory: Frontend
        run: |
          echo "" >> $GITHUB_WORKSPACE/audit-report.md
          echo "## Frontend Dependency Audit" >> $GITHUB_WORKSPACE/audit-report.md
          echo "" >> $GITHUB_WORKSPACE/audit-report.md
          if npm audit --audit-level=high 2>&1 | tee frontend-audit.txt; then
            echo "✅ No high or critical vulnerabilities found" >> $GITHUB_WORKSPACE/audit-report.md
          else
            echo "⚠️ Vulnerabilities detected:" >> $GITHUB_WORKSPACE/audit-report.md
            echo '```' >> $GITHUB_WORKSPACE/audit-report.md
            tail -20 frontend-audit.txt >> $GITHUB_WORKSPACE/audit-report.md
            echo '```' >> $GITHUB_WORKSPACE/audit-report.md
          fi
        continue-on-error: true

      - name: Comment audit summary on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: dependency-audit
          path: audit-report.md

      - name: Fail on critical vulnerabilities
        run: |
          cd Backend && npm audit --audit-level=critical
          cd "$GITHUB_WORKSPACE/Frontend" && npm audit --audit-level=critical

